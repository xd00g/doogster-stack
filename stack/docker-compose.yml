networks:
  proxy:
    name: proxy

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    networks:
      - proxy

  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
    environment:
      - DOCKER_API_VERSION=1.44

  whoami:
    image: traefik/whoami
    container_name: whoami
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`traffic.doogster.com`)"
      - "traefik.http.routers.whoami.entrypoints=web"

  news-feed:
    image: doogs-news-feed:latest
    container_name: news-feed
    restart: unless-stopped
    environment:
      WALLABAG_URL: "http://wallabag"
      WALLABAG_HOST: "read.doogster.com"
      WALLABAG_CLIENT_ID: "${WALLABAG_CLIENT_ID:-}"
      WALLABAG_CLIENT_SECRET: "${WALLABAG_CLIENT_SECRET:-}"
      WALLABAG_USERNAME: "${WALLABAG_USERNAME:-}"
      WALLABAG_PASSWORD: "${WALLABAG_PASSWORD:-}"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.news-feed.rule=Host(`news.doogster.com`)"
      - "traefik.http.routers.news-feed.entrypoints=web"
      - "traefik.http.services.news-feed.loadbalancer.server.port=5050"

  wallabag:
    image: wallabag/wallabag:latest
    container_name: wallabag
    restart: unless-stopped
    mem_limit: 512m
    environment:
      SYMFONY__ENV__DATABASE_DRIVER: "pdo_sqlite"
      SYMFONY__ENV__DOMAIN_NAME: "https://read.doogster.com"
      POPULATE_DATABASE: "True"
    volumes:
      - /mnt/data/personal-apps/wallabag/data:/var/www/wallabag/data
      - /mnt/data/personal-apps/wallabag/images:/var/www/wallabag/web/assets/images
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wallabag.rule=Host(`read.doogster.com`)"
      - "traefik.http.routers.wallabag.entrypoints=web"
      - "traefik.http.routers.wallabag.middlewares=wallabag-xfp"
      - "traefik.http.middlewares.wallabag-xfp.headers.customRequestHeaders.X-Forwarded-Proto=https"
      - "traefik.http.services.wallabag.loadbalancer.server.port=80"

  lubelogger:
    image: ghcr.io/hargata/lubelogger:latest
    container_name: lubelogger
    restart: unless-stopped
    mem_limit: 512m
    volumes:
      - /mnt/data/personal-apps/lubelogger/data:/App/data
      - /mnt/data/personal-apps/lubelogger/keys:/root/.aspnet/DataProtection-Keys
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lubelogger.rule=Host(`cars.doogster.com`)"
      - "traefik.http.routers.lubelogger.entrypoints=web"
      - "traefik.http.services.lubelogger.loadbalancer.server.port=8080"

  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    mem_limit: 256m
    environment:
      APP_URL: "https://status.doogster.com"
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - /mnt/data/personal-apps/beszel/data:/beszel_data
      - /mnt/data/personal-apps/beszel/socket:/beszel_socket
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.beszel.rule=Host(`status.doogster.com`)"
      - "traefik.http.routers.beszel.entrypoints=web"
      - "traefik.http.services.beszel.loadbalancer.server.port=8090"

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    profiles:
      - monitoring-agent
    network_mode: host
    mem_limit: 192m
    volumes:
      - /mnt/data/personal-apps/beszel/agent:/var/lib/beszel-agent
      - /mnt/data/personal-apps/beszel/socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/data/personal-apps/beszel/azure-data:/extra-filesystems/azure-data:ro
    environment:
      LISTEN: "/beszel_socket/beszel.sock"
      HUB_URL: "http://127.0.0.1:8090"
      TOKEN: "${BESZEL_TOKEN:-}"
      KEY: "${BESZEL_KEY:-}"

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    mem_limit: 256m
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "home.doogster.com"
    volumes:
      - /mnt/data/personal-apps/homepage/config:/app/config
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.entrypoints=web"
      - "traefik.http.routers.homepage.rule=Host(`home.doogster.com`)"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock --no-setup-token
    mem_limit: 256m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/data/personal-apps/portainer:/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.doogster.com`)"
      - "traefik.http.routers.portainer.entrypoints=web"
      - "traefik.http.routers.portainer.middlewares=portainer-xfp"
      - "traefik.http.middlewares.portainer-xfp.headers.customRequestHeaders.X-Forwarded-Proto=https"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  landing:
    image: nginx:alpine
    container_name: landing
    restart: unless-stopped
    mem_limit: 64m
    volumes:
      - /mnt/data/personal-apps/landing:/usr/share/nginx/html:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`doogster.com`) || Host(`www.doogster.com`)"
      - "traefik.http.routers.landing.entrypoints=web"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - /mnt/data/personal-apps/uptime-kuma:/app/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kuma.rule=Host(`kuma.doogster.com`)"
      - "traefik.http.routers.kuma.entrypoints=web"
      - "traefik.http.services.kuma.loadbalancer.server.port=3001"

  actual:
    image: actualbudget/actual-server:latest
    container_name: actual
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - /mnt/data/personal-apps/actual:/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.actual.rule=Host(`benjis.doogster.com`)"
      - "traefik.http.routers.actual.entrypoints=web"
      - "traefik.http.services.actual.loadbalancer.server.port=5006"

  oregon:
    image: nginx:alpine
    container_name: oregon
    restart: unless-stopped
    mem_limit: 32m
    volumes:
      - /mnt/data/personal-apps/oregon:/usr/share/nginx/html:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oregon.rule=Host(`oregon.doogster.com`)"
      - "traefik.http.routers.oregon.entrypoints=web"
      - "traefik.http.services.oregon.loadbalancer.server.port=80"
